<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 예제 1. 이름 출력하기
        // name이라는 이름의 변수 메모리를 만들고 "민수" 문자열 값 저장 
           let name = "민수";

        // name변수메모리에 들어있는 값을 얻어서 console.log로 출력
          console.log(name);

        // 예제 2. 나이 출력하기
        // age라는 이름의 변수 메모리를 만들고 숫자 20 값 저장
          let age = 20;

        // age변수 메모리에 들어 있는 값을 얻어 console.log로 출력
            console.log(20);

        // 예제 3. 좋아하는 음식 출력하기
        // food라는 이름의 변수 메모리를 만들고 "김치찌개"를 저장합니다.
            let food = "김치찌개";

        // food변수 메모리에 들어 있는 값을 얻어 console.log로 출력
            console.log(food);         

        // 예제 4. 두 숫자 더한 값 출력하기
        //num1 변수 메모리를 만들고 숫자 10을 저장
            let num1 = 10; 
            console.log(num1);
          

        //num2 변수 메모리를 만들고 숫자 5를 저장
            let num2 = 5;
            console.log(num2);

        //num1과 num2변수 메모리에 값을 더해서  result라는 이름의 변수 메모리 만들고 저장
            let result = num1 + num2;

        //result변수 메모리에 최종 저장된 값 얻어 console.log로 출력
         console.log(result);

        // 예제 5. 장바구니 총 금액 출력하기
        // itemName 변수 메모리 만들고 상품 이름 "노트" 저장
            let itemName = "노트";
            console.log(itemName);

        // itemPrice 변수 메모리 만들고 상품 한 개 가격 3000 저장
            let itemPrice = 3000;
            
        
        // itemCount 변수 메모리 만들고 상품 개수 4 저장
            let itemCount = 4;

        // itemPrice 변수 메모리에 저장된 상품 한개 가격 과  itemCount변수에 저장된 상품 개수 를 곱해서 -> * 
        // totalPrice 변수를 만들어서 곱한 결과 값(총금액) 저장
            let totalPrice = itemPrice * itemCount;
            console.log(itemCount, itemPrice);
            console.log(totalPrice);

        
        // 상품 이름과  총금액을 각각 console.log로 출력 
        const name1 = "야르";
        console.log(name1);




        

    </script>
    
</body>
</html>
