<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 변수 2차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - HP 깎아보기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 변수 메모리

    - 컴퓨터 메모리(RAM) 안에 데이터(값)를 저장하려고, 이름을 붙여 만든
      한 칸짜리 저장 공간을 '변수 메모리'라고 부릅니다.
    - 변수 메모리 = 단 하나의 값만 저장하는 한 칸의 메모리 공간 (단독 주택 메모리)

    변수 메모리 만들고 데이터 저장하는 문법
        let 변수명 = 저장할_데이터;
        -> let 예약어로 변수 메모리를 만들고, = 대입 연산자로 데이터를 그 변수 메모리에 저장(초기화)

    이미 만든 변수 메모리의 값 변경(재대입) 문법
        변수명 = 새_데이터;   (let 다시 X. 같은 변수 메모리에 새 데이터를 덮어씀)
*/


    // [TODO 1] 체력 변수 playerHp 를 만들고 100 을 넣으세요.  ↓
    //설명 : 컴퓨터 메모리에 playerHp라는 이름의 변수 메모리 공간을 만들고,
    //       = 대입연산자 기호로 100을 그 변수 메모리에 저장
    let playerHp = 100;

    // [TODO 2] playerHp 를 출력하세요.  ↓
    //설명 : playerHp 변수 메모리에 저장된 데이터(100) 를 얻어서 출력 
    console.log(playerHp);  //<--------------------------- 100 

    // [TODO 3] 몬스터에게 맞았다! playerHp 에 80 을 다시 넣으세요. (let 다시 X)  ↓
    //설명 : 이미 100 숫자가 저장된 playerHp 변수메모리에 다시 80을 다시 저장(기존 100을 덮어씀)
    playerHp = 80;

    // [TODO 4] playerHp 를 다시 출력하세요. (100 → 80 확인)  ↓
    //설명 : 값이 바껴서 저장된 playerHp 변수메모리의 데이터를 다시 얻어서 출력! (100 -> 80)
    console.log(playerHp); //<---------------------------- 80


    // ✅ 콘솔에 100, 80 이 차례로 나오면 성공!
  </script></body></html>
