<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 변수 4차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 틀린 이름 고치기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.<br>아래는 <b>규칙을 어긴 이름</b>이라 에러가 나요. 직접 고쳐보세요!</div>
  <script>
/*
    주제 : 변수 메모리의 이름(명) 짓는 규칙

    - 변수 메모리 이름에는 문자, 숫자, 특수기호 _ 와 $ 만 사용 가능
    - 첫 글자를 숫자로 시작 불가 (영문, _ , $ 로 시작)
    - 하이픈( - )은 빼기 연산자로 해석되어 불가 -> 여러 단어는 카멜표기법(myHp)
*/

    // ❌ 아래 두 줄은 변수 이름 규칙을 어겨서 에러가 납니다. 고쳐보세요!

    // [고치기 1] 숫자로 시작하면 안 돼요  (예: level2)
    // let 2level = 5;
       let level2 = 5;

    // [고치기 2] 하이픈(-) 은 못 써요  (예: myHp)
    // let my-hp = 100;
       let myHp = 100;

    // [TODO] 위 두 줄을 올바른 이름으로 고친 뒤, 각각 console.log 로 출력하세요.
    //   ↓
        console.log(level2);
        console.log(myHp);

    // ✅ 빨간 에러가 사라지고 값이 출력되면 성공!
    // 🤖 막히면 AI에게: "변수 이름 규칙에 맞게 고쳐줘"
  </script></body></html>
